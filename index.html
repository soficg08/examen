<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reto Hacker - Ana Sofia Cosmes</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
            cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24"><path fill="%23ffd700" d="M12 2l2 4h4l-3 3 1 4-4-2-4 2 1-4-3-3h4z"/><path fill="%23888" d="M9 16h6v4H9z"/></svg>') 16 16, auto;
        }

        /* CAPA DE OSCURIDAD */
        #mask {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background: radial-gradient(circle 120px at center, transparent 0%, rgba(0,0,0,1) 100%);
            z-index: 50; /* Capa intermedia */
        }

        /* TU NOMBRE - AJUSTADO PARA SER SIEMPRE VISIBLE */
        #player-name {
            position: fixed;
            bottom: 30px;
            left: 30px;
            color: #00ff00; 
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.5rem;
            font-weight: bold;
            text-transform: uppercase;
            z-index: 999; /* El valor más alto para que NO lo tape la oscuridad */
            text-shadow: 0 0 10px #00ff00;
            pointer-events: none;
        }

        /* EL TESORO */
        #treasure {
            position: absolute;
            width: 100px;
            height: 100px;
            z-index: 10; /* Por debajo de la máscara */
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.2s;
        }

        /* PANTALLA DE VICTORIA */
        #victory-screen {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: white; 
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        #victory-screen h1 {
            font-family: sans-serif;
            font-size: 4rem;
            color: black;
            margin-bottom: 20px;
        }

        #victory-gif {
            width: 400px;
        }
    </style>
</head>
<body>

    <div id="player-name">Ana Sofia Cosmes</div>

    <div id="mask"></div>
    
    <img src="tesoro.png" id="treasure" alt="Trofeo">

    <div id="victory-screen">
        <h1>¡Nivel hacker superado!</h1>
        <img src="celebracion.gif" id="victory-gif" alt="Celebración">
    </div>

    <script>
        const mask = document.getElementById('mask');
        const treasure = document.getElementById('treasure');
        const victory = document.getElementById('victory-screen');
        const nameLabel = document.getElementById('player-name');

        // Posición aleatoria
        function init() {
            const x = Math.random() * (window.innerWidth - 120);
            const y = Math.random() * (window.innerHeight - 120);
            treasure.style.left = x + 'px';
            treasure.style.top = y + 'px';
        }

        // Movimiento linterna
        window.addEventListener('mousemove', (e) => {
            const x = e.clientX;
            const y = e.clientY;

            mask.style.background = `radial-gradient(circle 120px at ${x}px ${y}px, transparent 0%, rgba(0,0,0,1) 80%)`;

            // Detectar proximidad
            const rect = treasure.getBoundingClientRect();
            const tx = rect.left + rect.width / 2;
            const ty = rect.top + rect.height / 2;
            const dist = Math.sqrt(Math.pow(x - tx, 2) + Math.pow(y - ty, 2));

            treasure.style.opacity = dist < 120 ? "1" : "0";
        });

        // Al ganar
        treasure.addEventListener('click', () => {
            victory.style.display = 'flex';
            nameLabel.style.color = 'black'; // Cambia a negro para que se vea en el fondo blanco
            nameLabel.style.textShadow = 'none';
        });

        init();
    </script>
</body>
</html>
